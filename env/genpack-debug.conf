# Build packages with split debug info and installed sources so that
# coredumpctl gdb on the deployed B580 machine produces a readable
# backtrace with file/line information.
#
# Applied to the packages listed in genpack.json5 ``env`` field.
# Reference: Intel-Arc-B580-GRD-anv-crash-with-iHD.md in tachikoma.

FEATURES="${FEATURES} splitdebug installsources"
CFLAGS="${CFLAGS} -ggdb3 -fno-omit-frame-pointer"
CXXFLAGS="${CXXFLAGS} -ggdb3 -fno-omit-frame-pointer"
